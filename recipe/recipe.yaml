context:
  version: "4.7.0"

package:
  name: langfuse-python
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/l/langfuse/langfuse-${{ version }}.tar.gz
    sha256: 7b592a251777dae44f76db7971871ff16c4c200d490cb5cd4e2f3822a1d593ec

build:
  number: 0
  script: ${{ PYTHON }} -m pip install .
  noarch: python

requirements:
  host:
    - python ${{ python_min }}.*
    - uv-build >=0.11.2,<0.12.0
    - pip
  run:
    - python >=${{ python_min }}
    - httpx >=0.15.4,<1.0
    - pydantic >=2,<3
    - backoff >=1.10.0
    - wrapt >=1.14,<2.0
    - packaging >=23.2,<27.0
    - opentelemetry-api >=1.33.1,<2
    - opentelemetry-sdk >=1.33.1,<2
    - opentelemetry-exporter-otlp-proto-http >=1.33.1,<2

tests:
  - python:
      imports:
        - langfuse
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: A client library for accessing langfuse
  homepage: https://github.com/langfuse/langfuse-python
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - moritzwilksch
